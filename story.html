<!DOCTYPE html>
<html>
<head>
    <title>Story</title>
<link rel="icon" href="images/dragon.webp">
    <style>
        body {
            margin: 0;
            background: black;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        img {
            max-width: 90%;
            max-height: 90%;
            border: 5px solid white;
            border-radius: 15px;
        }

        #next {
            position: absolute;
            bottom: 30px;
            right: 30px;

            padding: 15px 30px;
            font-size: 24px;

            background: orange;
            color: white;

            border: none;
            border-radius: 15px;
        }
    </style>
</head>

<body>

    <img src="images/bh.png" alt="Story Image">

    <button id="next">Start Game</button>

    <script>
        document.getElementById("next").addEventListener("click", () => {
            window.location.href = "game.html";
        });
    </script>

</body>
</html>
